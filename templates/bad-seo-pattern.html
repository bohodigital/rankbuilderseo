<section class="section">
  <div class="page">
    <article class="article">
      <header class="article-header">
        <p class="kicker">[[section_label]]</p>
        <h1>[[page_title]]</h1>
        <p class="lede">[[page_description]]</p>
        <div class="article-meta">[[article_meta]]</div>
      </header>
      [[short_answer_block]]
      [[risk_block]]
      [[verdict_block]]
      <div class="article-body">
        [[content_blocks]]
      </div>
      [[source_notes_block]]
      [[related_links_block]]
    </article>
  </div>
</section>
